name: v1-go-evaluator

on:
  workflow_dispatch:
    inputs:
      since_utc:
        description: "Burn-in start timestamp (UTC, ISO8601)"
        required: false
        default: "2026-03-06T00:00:00Z"
      sha_lock:
        description: "SHA lock for strict burn-in tracking"
        required: false
        default: "635d1cd16fb97583769d2fe92a6369278af74bb3"
  schedule:
    - cron: "30 7 * * *"

permissions:
  contents: read
  actions: read

jobs:
  evaluate-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Evaluate v1.0.0 GO criteria (scheduled-only)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          SINCE_UTC_INPUT: ${{ inputs.since_utc }}
          SHA_LOCK_INPUT: ${{ inputs.sha_lock }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/ci/evaluate_v1_go.sh
          SINCE_UTC="${SINCE_UTC_INPUT:-2026-03-06T00:00:00Z}"
          SHA_LOCK="${SHA_LOCK_INPUT:-635d1cd16fb97583769d2fe92a6369278af74bb3}"
          ./scripts/ci/evaluate_v1_go.sh \
            --since "$SINCE_UTC" \
            --repo "$GITHUB_REPOSITORY" \
            --sha-lock "$SHA_LOCK"

      - name: Upload GO evaluator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-go-evaluator-${{ github.run_number }}
          path: artifacts/release-go/
          if-no-files-found: error
